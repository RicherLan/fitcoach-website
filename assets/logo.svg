<?xml version="1.0" encoding="UTF-8"?>
<!--
  MIGO FIT — App Icon / Logo Mark
  设计理念: 字母 M 由两座山峰构成，象征"目标的起伏与征服"。
  配色: 品牌主渐变 #FF4D4F → #FFA940 (温暖红橙)
  适用: App Icon / Favicon / 社交媒体头像 / 印刷品
  尺寸: 100x100 viewBox, 矢量无损放大至 1024×1024 以上
-->
<svg width="200" height="200" viewBox="0 0 100 100"
     xmlns="http://www.w3.org/2000/svg"
     role="img" aria-label="MIGO FIT logo">
  <defs>
    <linearGradient id="migoBrandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF4D4F"/>
      <stop offset="100%" stop-color="#FFA940"/>
    </linearGradient>
  </defs>

  <!-- 圆角矩形背景: iOS/Android 平台规范的 22% 圆角率 -->
  <rect x="0" y="0" width="100" height="100" rx="22" ry="22" fill="url(#migoBrandGradient)"/>

  <!-- 字母 M: 两座山峰，向上的活力线条 -->
  <path d="M 25 73 L 25 27 L 50 52 L 75 27 L 75 73"
        fill="none" stroke="#FFFFFF" stroke-width="9"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
